<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard</title>
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
        ></script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0f1117;
                --surface: #1a1d27;
                --border: #2a2d3a;
                --text: #e8eaf0;
                --muted: #6b7080;
                --accent-blue: #4f8ef7;
                --accent-green: #34d399;
                --accent-purple: #a78bfa;
                --accent-orange: #fb923c;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                min-height: 100vh;
                padding: 2rem 1.5rem;
            }

            header {
                max-width: 860px;
                margin: 0 auto 1.75rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            h1 {
                font-size: 1.1rem;
                font-weight: 600;
                letter-spacing: -0.02em;
            }

            .updated {
                font-size: 0.75rem;
                color: var(--muted);
            }

            .refresh-btn {
                background: none;
                border: 1px solid var(--border);
                color: var(--muted);
                border-radius: 6px;
                padding: 0.3rem 0.65rem;
                font-size: 0.75rem;
                cursor: pointer;
                transition:
                    border-color 0.15s,
                    color 0.15s;
                margin-left: 0.6rem;
            }
            .refresh-btn:hover {
                border-color: var(--accent-blue);
                color: var(--accent-blue);
            }

            .grid {
                max-width: 860px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            .ext-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 1rem 1.25rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            .ext-icon {
                width: 32px;
                height: 32px;
                border-radius: 7px;
                background: var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.95rem;
                flex-shrink: 0;
            }

            .ext-info {
                flex: 1;
                min-width: 0;
            }

            .ext-name {
                font-size: 0.9rem;
                font-weight: 600;
            }
            .ext-id {
                font-size: 0.7rem;
                color: var(--muted);
                margin-top: 1px;
            }

            .stats {
                display: flex;
                gap: 1.25rem;
                flex-shrink: 0;
            }

            .stat {
                text-align: right;
            }

            .stat-label {
                font-size: 0.65rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                margin-bottom: 2px;
            }

            .stat-value {
                font-size: 1.2rem;
                font-weight: 700;
                letter-spacing: -0.03em;
                line-height: 1;
            }

            .stat-value.loading {
                color: var(--border);
                font-size: 0.9rem;
                font-weight: 400;
            }

            .color-blue {
                color: var(--accent-blue);
            }
            .color-green {
                color: var(--accent-green);
            }
            .color-purple {
                color: var(--accent-purple);
            }
            .color-orange {
                color: var(--accent-orange);
            }

            .divider {
                width: 1px;
                height: 32px;
                background: var(--border);
                flex-shrink: 0;
            }

            .profile-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 1rem 1.5rem;
                max-width: 860px;
                margin: 0 auto 0.75rem;
                display: flex;
                flex-direction: row;
                gap: 2rem;
                flex-wrap: wrap;
            }

            .social-stat {
                text-align: center;
            }

            .color-x {
                color: #e7e9ea;
            }
            .color-reddit {
                color: #ff4500;
            }
            .color-facebook {
                color: #1877f2;
            }
            .color-github {
                color: #c9d1d9;
            }
            .color-youtube {
                color: #ff0000;
            }

            .error-banner {
                max-width: 860px;
                margin: 0 auto 1rem;
                padding: 0.75rem 1rem;
                background: #2a1515;
                border: 1px solid #5c2020;
                border-radius: 8px;
                font-size: 0.82rem;
                color: #f87171;
            }
        </style>
    </head>
    <body x-data="dashboard()" x-init="init()">
        <header>
            <h1>Dashboard</h1>
            <div style="display: flex; align-items: center">
                <span
                    class="updated"
                    x-text="updatedAt ? 'Updated ' + new Date(updatedAt).toLocaleTimeString() : ''"
                ></span>
                <button class="refresh-btn" @click="load()">Refresh</button>
            </div>
        </header>

        <div
            class="error-banner"
            x-show="error"
            x-text="'Failed to load stats: ' + error"
        ></div>

        <div class="profile-card" x-show="profile">
            <template x-for="item in profileItems()" :key="item.label">
                <div class="social-stat">
                    <div class="stat-label" x-text="item.label"></div>
                    <div
                        class="stat-value"
                        :class="item.color"
                        x-text="fmt(item.value)"
                    ></div>
                </div>
            </template>
        </div>

        <div class="grid">
            <template x-for="ext in cards" :key="ext.id">
                <div class="ext-card">
                    <div class="ext-icon">
                        <img
                            :src="ext.favicon"
                            :alt="ext.label"
                            width="22"
                            height="22"
                            style="border-radius: 4px; object-fit: contain"
                        />
                    </div>
                    <div class="ext-info">
                        <div class="ext-name" x-text="ext.label"></div>
                        <div class="ext-id" x-text="ext.id"></div>
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">Marketplace</div>
                            <div
                                class="stat-value color-blue"
                                :class="{ loading }"
                                x-text="loading ? '…' : fmt(ext.marketplace?.installs)"
                            ></div>
                        </div>
                        <div class="divider"></div>
                        <div class="stat">
                            <div class="stat-label">Open VSX</div>
                            <div
                                class="stat-value color-green"
                                :class="{ loading }"
                                x-text="loading ? '…' : (ext.openVsx?.notFound ? '—' : fmt(ext.openVsx?.downloads))"
                            ></div>
                        </div>
                        <div class="divider"></div>
                        <div class="stat">
                            <div class="stat-label">Visitors 30d</div>
                            <div
                                class="stat-value color-purple"
                                :class="{ loading }"
                                x-text="loading ? '…' : fmt(ext.visitors)"
                            ></div>
                        </div>
                        <div class="divider"></div>
                        <div class="stat">
                            <div class="stat-label">Returning</div>
                            <div
                                class="stat-value color-orange"
                                :class="{ loading }"
                                x-text="loading ? '…' : fmt(ext.returning)"
                            ></div>
                        </div>
                        <div class="divider"></div>
                        <div class="stat">
                            <div class="stat-label">Users</div>
                            <div
                                class="stat-value color-green"
                                :class="{ loading }"
                                x-text="loading ? '…' : fmt(ext.users)"
                            ></div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <script>
            const EXTENSIONS = [
                {
                    id: "GitusAI.gitusai",
                    label: "GitusAI",
                    favicon: "https://gitusai.com/logo.png",
                },
                {
                    id: "WatchAPI.watchapi-client",
                    label: "WatchAPI",
                    favicon:
                        "https://watchapi.dev/_next/image?url=%2Flogo.png&w=96&q=75",
                },
            ];

            function dashboard() {
                return {
                    cards: EXTENSIONS,
                    loading: true,
                    updatedAt: null,
                    error: null,
                    profile: null,

                    async init() {
                        await Promise.all([this.load(), this.loadProfile()]);
                        this.loadX();
                        setInterval(() => this.load(), 5 * 60 * 1000);
                        setInterval(() => this.loadProfile(), 15 * 60 * 1000);
                        setInterval(() => this.loadX(), 15 * 60 * 1000);
                    },

                    async loadProfile() {
                        try {
                            const res = await fetch("/api/profile");
                            if (!res.ok)
                                throw new Error(`Server error: ${res.status}`);
                            this.profile = await res.json();
                        } catch (err) {
                            console.error("Profile fetch failed:", err.message);
                        }
                    },

                    async loadX() {
                        try {
                            const res = await fetch("/api/x-followers");
                            const { x } = await res.json();
                            this.profile = { ...this.profile, x };
                        } catch (err) {
                            console.error("X fetch failed:", err.message);
                        }
                    },

                    profileItems() {
                        if (!this.profile) return [];
                        return [
                            {
                                label: "Reddit",
                                value: this.profile.reddit,
                                color: "color-reddit",
                            },
                            {
                                label: "Facebook",
                                value: this.profile.facebook,
                                color: "color-facebook",
                            },
                            {
                                label: "GitHub",
                                value: this.profile.github,
                                color: "color-github",
                            },
                            {
                                label: "YouTube",
                                value: this.profile.youtube,
                                color: "color-youtube",
                            },
                            {
                                label: "X",
                                value: this.profile.x,
                                color: "color-x",
                            },
                        ].filter((i) => i.value !== null);
                    },

                    async load() {
                        this.loading = true;
                        this.error = null;
                        try {
                            const res = await fetch("/api/stats");
                            if (!res.ok)
                                throw new Error(`Server error: ${res.status}`);
                            const { stats, updatedAt } = await res.json();
                            this.cards = stats.map((s) => ({
                                ...EXTENSIONS.find((e) => e.id === s.id),
                                ...s,
                            }));
                            this.updatedAt = updatedAt;
                        } catch (err) {
                            this.error = err.message;
                        } finally {
                            this.loading = false;
                        }
                    },

                    fmt(n) {
                        if (n == null) return "—";
                        if (n >= 1_000_000)
                            return (n / 1_000_000).toFixed(1) + "M";
                        if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
                        return n.toLocaleString();
                    },
                };
            }
        </script>
    </body>
</html>
